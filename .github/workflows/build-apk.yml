name: Build Memo APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate android platform files (keep our code)
        run: |
          cp -r lib /tmp/lib_bak
          cp pubspec.yaml /tmp/pubspec_bak
          flutter create --org com.memo --project-name memo --platforms=android .
          rm -rf lib && cp -r /tmp/lib_bak lib
          cp /tmp/pubspec_bak pubspec.yaml

      - name: Add CAMERA permission
        run: |
          MAN=android/app/src/main/AndroidManifest.xml
          if ! grep -q "android.permission.CAMERA" "$MAN"; then
            sed -i 's#<application#<uses-permission android:name="android.permission.CAMERA"/>\n    <application#' "$MAN"
          fi

      - name: Get packages
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: memo-app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
